name: Download TOYA Stocks
permissions:
  contents: write
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TOYA_API_KEY: ${{ secrets.TOYA_API_KEY }}

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
  uses: actions/checkout@v4
  with:
    persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python download_stocks.py

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add STOCKS/
          git commit -m "Stocks $(date +'%Y-%m-%d')" || echo "No changes"
          git push
